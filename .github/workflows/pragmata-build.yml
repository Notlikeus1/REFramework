name: Pragmata Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  pragmata-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -S ${{github.workspace}} -B ${{github.workspace}}/build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DDEVELOPER_MODE=OFF -DREF_BUILD_PRAGMATA_SDK=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target PRAGMATA

      - name: Verify Build
        run: |
          if (Test-Path "${{github.workspace}}/build/bin/PRAGMATA/dinput8.dll") {
            echo "Build successful: dinput8.dll found."
          } else {
            echo "Error: dinput8.dll not found!"
            exit 1
          }
        shell: powershell

      - name: Compress release
        run: |
          echo ${{github.sha}} > ${{github.workspace}}/reframework_revision.txt
          echo none > ${{github.workspace}}/DELETE_OPENVR_API_DLL_IF_YOU_WANT_TO_USE_OPENXR
          
          # Dosyaları tek tek ekleyerek hangisinin hata verdiğini görelim
          7z a PRAGMATA.zip reframework_revision.txt
          7z a PRAGMATA.zip DELETE_OPENVR_API_DLL_IF_YOU_WANT_TO_USE_OPENXR
          7z a PRAGMATA.zip ./build/bin/PRAGMATA/dinput8.dll
          
          # Bağımlılıkları kontrol ederek ekle
          if (Test-Path "./dependencies/openvr/bin/win64/openvr_api.dll") {
            7z a PRAGMATA.zip ./dependencies/openvr/bin/win64/openvr_api.dll
          }
          
          if (Test-Path "./build/_deps/openxr-build/src/loader/Release/openxr_loader.dll") {
            7z a PRAGMATA.zip ./build/_deps/openxr-build/src/loader/Release/openxr_loader.dll
          }
          
          7z a PRAGMATA.zip ./scripts
          7z rn PRAGMATA.zip scripts reframework/autorun
        shell: powershell

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PRAGMATA
          path: ${{github.workspace}}/PRAGMATA.zip
